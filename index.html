<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Story</title>

    <link type="text/css" rel="stylesheet" href="./index_files/default.css">
    <script type="text/javascript" src="./index_files/jquery.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-parser.js"></script>
    <script type="text/javascript" src="./index_files/jscex-jit.js"></script>
    <script type="text/javascript" src="./index_files/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-async.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="./index_files/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./index_files/love.js" charset="utf-8"></script>
    <script type="text/javascript" src="./config.js"></script>
    <style type="text/css">
        .STYLE1 { color: #666666 }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #ffe;
        }

        #main {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* O wrap mantém 1100x680 internamente mas é escalado via JS */
        #wrap {
            position: relative;
            width: 1100px;
            height: 680px;
            transform-origin: top left;
            /* scale aplicado via JS */
        }

        #text {
            width: 400px;
            height: 425px;
            left: 60px;
            top: 80px;
            position: absolute;
            z-index: 10;
        }

        #code {
            display: none;
            font-size: 22px;
            line-height: 2;
        }

        #clock-box {
            position: absolute;
            left: 60px;
            top: 520px;
            font-size: 36px;
            display: none;
            z-index: 10;
        }

        #clock-box a { font-size: 36px; text-decoration: none; }
        #clock { margin-left: 48px; }
        #clock .digit { font-size: 80px; }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 1100px;
            height: 680px;
        }

        #error { margin: 0 auto; text-align: center; margin-top: 60px; display: none; }
        .hand { cursor: pointer; }
        .say { margin-left: 5px; }

        .rotateImages {
            -webkit-animation: myRotate 10s linear infinite;
            animation: myRotate 10s linear infinite;
        }
        @keyframes myRotate {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<img id="music-btn" src="https://ajlovechina.github.io/loveBalloon/static/music.png"
     style="position:fixed;z-index:10001;top:10px;right:10px;width:36px;height:36px;"
     onclick="var m=document.querySelector('.song-audio-autoplay');if(m.paused){m.play();this.className='rotateImages'}else{m.pause();this.className=''}">
<audio class="song-audio-autoplay" controls loop style="display:none;visibility:hidden">
    <source src="./index_files/music.mp3" type="audio/mp3"/>
</audio>

<div id="main">
    <div id="error">Seu navegador não suporta HTML5 Canvas. Por favor use Chrome ou Firefox.</div>
    <div id="wrap">
        <div id="text">
            <div id="code"></div>
        </div>
        <div id="clock-box">
            <span id="clock-box-inside-text"></span>
            <div id="clock"></div>
        </div>
        <canvas id="canvas" width="1100" height="680"></canvas>
    </div>
</div>

<script type="text/javascript">
    // Escala o #wrap para caber na tela mantendo proporção 1100x680
    (function scaleWrap() {
        var wrap = document.getElementById('wrap');
        var scaleX = window.innerWidth / 1100;
        var scaleY = window.innerHeight / 680;
        var scale = Math.min(scaleX, scaleY);
        wrap.style.transform = 'scale(' + scale + ')';
        wrap.style.webkitTransform = 'scale(' + scale + ')';
        // Centraliza
        var offsetX = (window.innerWidth - 1100 * scale) / 2;
        var offsetY = (window.innerHeight - 680 * scale) / 2;
        wrap.style.marginLeft = offsetX + 'px';
        wrap.style.marginTop = offsetY + 'px';
    })();

    // Monta o texto
    $('#code').html(config.lines.map(function(item) {
        return '<span class="say">' + item + '</span><br><span class="say"> </span><br>';
    }).join(''));

    // Monta os nomes — suporta tanto array quanto string separada por "e"
    var name0 = Array.isArray(config.names) ? config.names[0] : (config.names || '');
    var name1 = Array.isArray(config.names) ? config.names[1] : '';
    if (name1) {
        $("#clock-box-inside-text").html(name0 + '<span class="STYLE1"> e </span>' + name1 + '<span class="STYLE1"> estão juntos há</span>');
    } else {
        $("#clock-box-inside-text").html(name0 + '<span class="STYLE1"> estão juntos há</span>');
    }
</script>

<script>
    (function () {
        var canvas = $('#canvas');

        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        // Canvas interno sempre 1100x680 — o scale no CSS cuida do resto
        var width = 1100;
        var height = 680;

        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]]
            ],
            bloom: {
                num: 700,
                width: 1080,
                height: 650,
            },
            footer: {
                width: 1200,
                height: 5,
                speed: 10,
            }
        };

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        // Fator de escala para converter coordenadas de toque (tela) → canvas (1100x680)
        function getTouchCanvasPos(touch) {
            var wrap = document.getElementById('wrap');
            var scaleX = window.innerWidth / 1100;
            var scaleY = window.innerHeight / 680;
            var scale = Math.min(scaleX, scaleY);
            var offsetX = (window.innerWidth - 1100 * scale) / 2;
            var offsetY = (window.innerHeight - 680 * scale) / 2;
            return {
                x: (touch.pageX - offsetX) / scale,
                y: (touch.pageY - offsetY) / scale
            };
        }

        canvas.click(function (e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0;
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function (e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        // Toque no celular — qualquer lugar da tela inicia a animação
        document.addEventListener('touchstart', function(e) {
            if (hold) {
                hold = 0;
            }
        }, { passive: true });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);

            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background", "#ffe");
            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var jumpAnimate = eval(Jscex.compile("async", function () {
            while (true) {
                tree.ctx.clearRect(0, 0, width, height);
                tree.jump();
                foot.draw();
                $await(Jscex.Async.sleep(25));
            }
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            var together = new Date(config.date);
            $("#code").show().typewriter();
            $("#clock-box").fadeIn(500);
            while (true) {
                timeElapse(together);
                $await(Jscex.Async.sleep(1000));
            }
        }));

        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
            $await(jumpAnimate());
        }));

        runAsync().start();
    })();
</script>

</body>
</html>
