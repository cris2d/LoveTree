<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <!-- META RESPONSIVO: essencial para mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Story</title>

    <link type="text/css" rel="stylesheet" href="./index_files/default.css">
    <script type="text/javascript" src="./index_files/jquery.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-parser.js"></script>
    <script type="text/javascript" src="./index_files/jscex-jit.js"></script>
    <script type="text/javascript" src="./index_files/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-async.min.js"></script>
    <script type="text/javascript" src="./index_files/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="./index_files/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./index_files/love.js" charset="utf-8"></script>
    <script type="text/javascript" src="./config.js"></script>
    <style type="text/css">
        .STYLE1 { color: #666666 }
    </style>
</head>
<body>

<img src="https://ajlovechina.github.io/loveBalloon/static/music.png" style="position: fixed;z-index: 10001;top:10px;right:10px;width:36px;height:36px;" onclick="let m = document.querySelector('.song-audio-autoplay'); if (m.paused ) {m.play(); this.className = 'rotateImages'} else {m.pause(); this.className = ''}">
<audio class="song-audio-autoplay" controls loop style="display: none;visibility: hidden">
    <source src="./index_files/music.mp3" type="audio/mp3"/>
</audio>
<style type="text/css">
    .rotateImages{
        -webkit-animation:myRotate 10s linear infinite;
        animation:myRotate 10s linear infinite;
    }
    @-webkit-keyframes myRotate{
        0%{ -webkit-transform: rotate(0deg);}
        50%{ -webkit-transform: rotate(180deg);}
        100%{ -webkit-transform: rotate(360deg);}
    }
    @keyframes myRotate{
        0%{ -webkit-transform: rotate(0deg);}
        50%{ -webkit-transform: rotate(180deg);}
        100%{ -webkit-transform: rotate(360deg);}
    }
</style>

<div id="main">
    <div id="error">本页面采用HTML5编辑，目前您的浏览器无法显示，请换成谷歌(<a
            href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a>)或者火狐(<a
            href="http://firefox.com.cn/download/">Firefox</a>)浏览器，或者其他游览器的最新版本。
    </div>
    <div id="wrap">
        <div id="text">
            <div id="code">
            </div>
        </div>
        <div id="clock-box">
            <span id="clock-box-inside-text"></span>
            <div id="clock"></div>
        </div>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script type="text/javascript">
    $('#code').html(config.lines.map(item => {
        return `<span class="say">${item}</span><br><span class="say"> </span><br>`
    }).reduce((a, b) => a + b))

    $("#clock-box-inside-text").html(`${config.names[0]}<span class="STYLE1">与</span> ${config.names[1]}<span class="STYLE1">已经相恋了</span>`)
</script>

<script>
    (function () {
        var canvas = $('#canvas');

        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        // Pega o tamanho real da tela
        var width = window.innerWidth;
        var height = window.innerHeight;

        canvas.attr("width", width);
        canvas.attr("height", height);

        // Escala proporcional baseada na largura original (1100px)
        var scale = width / 1100;

        // Função para escalar coordenadas X (original 1100 -> largura real)
        function sx(v) { return Math.round(v * scale); }
        // Função para escalar coordenadas Y (original 680 -> altura real)
        function sy(v) { return Math.round(v * (height / 680)); }

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                [sx(535), sy(680), sx(570), sy(250), sx(500), sy(200), 30, 100, [
                    [sx(540), sy(500), sx(455), sy(417), sx(340), sy(400), 13, 100, [
                        [sx(450), sy(435), sx(434), sy(430), sx(394), sy(395), 2, 40]
                    ]],
                    [sx(550), sy(445), sx(600), sy(356), sx(680), sy(345), 12, 100, [
                        [sx(578), sy(400), sx(648), sy(409), sx(661), sy(426), 3, 80]
                    ]],
                    [sx(539), sy(281), sx(537), sy(248), sx(534), sy(217), 3, 40],
                    [sx(546), sy(397), sx(413), sy(247), sx(328), sy(244), 9, 80, [
                        [sx(427), sy(286), sx(383), sy(253), sx(371), sy(205), 2, 40],
                        [sx(498), sy(345), sx(435), sy(315), sx(395), sy(330), 4, 60]
                    ]],
                    [sx(546), sy(357), sx(608), sy(252), sx(678), sy(221), 6, 100, [
                        [sx(590), sy(293), sx(646), sy(277), sx(648), sy(271), 2, 80]
                    ]]
                ]]
            ],
            bloom: {
                num: 700,
                width: width - 20,
                height: height - 30,
            },
            footer: {
                width: width + 100,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function (e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0;
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function (e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        // Suporte a toque (mobile) — qualquer toque na tela inicia a animação
        canvas[0].addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (hold) {
                hold = 0;
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }, { passive: false });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            var moveX = Math.round(width * 0.45);
            tree.snapshot("p1", Math.round(width * 0.22), 0, Math.round(width * 0.55), height);
            while (tree.move("p1", moveX, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", moveX, 0, Math.round(width * 0.55), height);

            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background", "#ffe");
            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var jumpAnimate = eval(Jscex.compile("async", function () {
            while (true) {
                tree.ctx.clearRect(0, 0, width, height);
                tree.jump();
                foot.draw();
                $await(Jscex.Async.sleep(25));
            }
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            var together = new Date(config.date);

            $("#code").show().typewriter();
            $("#clock-box").fadeIn(500);
            while (true) {
                timeElapse(together);
                $await(Jscex.Async.sleep(1000));
            }
        }));

        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());

            textAnimate().start();

            $await(jumpAnimate());
        }));

        runAsync().start();
    })();
</script>

</body>
</html>
